<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM System - Multi-language</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        .sidebar-card, .table-pro { background: white; border-radius: 20px; border: none; box-shadow: var(--card-shadow); }
        .btn-action { border-radius: 12px; font-weight: 600; padding: 10px 20px; }
        .modal-content { border-radius: 20px; }
        .dark-mode { background-color: #0f172a; color: #f8fafc; }
        .dark-mode .sidebar-card, .dark-mode .table-pro, .dark-mode .modal-content { background: #1e293b; color: white; }
    </style>
</head>
<body>

<div class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-700 mb-0 text-primary"><i class="bi bi-shield-check me-2"></i>HRM <span id="txt-v2">V3.1</span></h3>
            <p id="fullDate" class="text-muted small mb-0"></p>
        </div>
        <div class="d-flex align-items-center gap-2">
            <button onclick="toggleLang()" class="btn btn-light rounded-pill border-0 shadow-sm px-3 fw-bold text-primary">
                <i class="bi bi-translate me-1"></i> <span id="currentLangBtn">VN</span>
            </button>
            <div class="fw-bold mx-3" id="liveClock">00:00:00</div>
            <button onclick="document.body.classList.toggle('dark-mode')" class="btn btn-outline-secondary rounded-circle border-0"><i class="bi bi-moon-stars"></i></button>
        </div>
    </div>

    <div class="row g-3 mb-4 text-center">
        <div class="col-md-3"><div class="card sidebar-card p-3 border-start border-primary border-4 shadow-sm">
            <small class="text-muted" id="lbl-totalStaff">Nhân sự</small><div class="h4 fw-bold mb-0" id="statTotalStaff">0</div>
        </div></div>
        <div class="col-md-3"><div class="card sidebar-card p-3 border-start border-warning border-4 shadow-sm">
            <small class="text-muted" id="lbl-working">Đang làm</small><div class="h4 fw-bold mb-0 text-warning" id="statWorking">0</div>
        </div></div>
        <div class="col-md-3"><div class="card sidebar-card p-3 border-start border-success border-4 shadow-sm">
            <small class="text-muted" id="lbl-totalOT">Tổng OT</small><div class="h4 fw-bold mb-0 text-success" id="statTotalOT">0h</div>
        </div></div>
        <div class="col-md-3"><div class="card sidebar-card p-3 border-start border-danger border-4 shadow-sm">
            <small class="text-muted" id="lbl-absent">Vắng</small><div class="h4 fw-bold mb-0 text-danger" id="statAbsent">0</div>
        </div></div>
    </div>

    <div class="row g-4">
        <div class="col-lg-3">
            <div class="sidebar-card p-4 mb-4">
                <h6 class="fw-bold mb-3 small text-uppercase" id="lbl-punchIn">Chấm công nhanh</h6>
                <select id="empSelect" class="form-select mb-3 border-0 bg-light p-3"></select>
                <button onclick="checkIn()" class="btn btn-primary btn-action w-100 shadow" id="btn-confirm">XÁC NHẬN</button>
            </div>
            <div class="sidebar-card p-4">
                <h6 class="fw-bold mb-3 small text-uppercase" id="lbl-dashboard">Bảng điều khiển</h6>
                <div class="d-grid gap-2">
                    <button class="btn btn-light text-start border-0" data-bs-toggle="modal" data-bs-target="#staffModal"><i class="bi bi-people me-2"></i><span id="btn-staffMgmt">Quản lý nhân sự</span></button>
                    <button class="btn btn-light text-start border-0" onclick="openReport()"><i class="bi bi-bar-chart-line me-2"></i><span id="btn-report">Báo cáo tháng</span></button>
                    <button class="btn btn-light text-start border-0" onclick="exportExcel()"><i class="bi bi-file-earmark-excel me-2"></i><span id="btn-excel">Xuất Excel</span></button>
                </div>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="table-pro p-4 h-100">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0" id="lbl-todayLog">Hoạt động hôm nay</h5>
                    <input type="text" id="filterInput" onkeyup="refreshTable()" class="form-control w-50 bg-light border-0" placeholder="...">
                </div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead id="table-head">
                            <tr><th id="th-name">Nhân viên</th><th id="th-in">Vào</th><th id="th-out">Ra</th><th id="th-total">Tổng</th><th id="th-ot">OT</th><th></th></tr>
                        </thead>
                        <tbody id="logTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 1. TỪ ĐIỂN NGÔN NGỮ
    const translations = {
        vi: {
            title: "Hệ Thống HRM",
            totalStaff: "Nhân sự",
            working: "Đang làm",
            totalOT: "Tổng OT",
            absent: "Vắng",
            punchIn: "Chấm công",
            confirm: "XÁC NHẬN",
            dashboard: "Bảng điều khiển",
            staffMgmt: "Quản lý nhân sự",
            report: "Báo cáo tháng",
            excel: "Xuất Excel",
            todayLog: "Hoạt động hôm nay",
            searchPlace: "Tìm tên nhân viên...",
            thName: "Nhân viên", thIn: "Vào", thOut: "Ra", thTotal: "Tổng", thOT: "OT",
            statusIn: "Đang làm", statusOut: "Đã về",
            msgSuccessIn: "Chào buổi sáng!",
            msgSuccessOut: "Tạm biệt!",
            langBtn: "VN"
        },
        cn: {
            title: "人力资源系统",
            totalStaff: "员工总数",
            working: "正在工作",
            totalOT: "加班总计",
            absent: "缺勤人数",
            punchIn: "考勤打卡",
            confirm: "确认打卡",
            dashboard: "管理控制台",
            staffMgmt: "人员管理",
            report: "月度报表",
            excel: "导出表格",
            todayLog: "今日动态",
            searchPlace: "搜索员工姓名...",
            thName: "姓名", thIn: "签到", thOut: "签退", thTotal: "工时", thOT: "加班",
            statusIn: "工作中", statusOut: "已签退",
            msgSuccessIn: "早上好!",
            msgSuccessOut: "辛苦了, 再见!",
            langBtn: "CN"
        }
    };

    let curLang = localStorage.getItem('lang') || 'vi';
    let db = JSON.parse(localStorage.getItem('hrm_db_v3')) || [];
    let staff = JSON.parse(localStorage.getItem('hrm_staff_v3')) || ["VŨ HOÀI NAM"];

    // 2. HÀM CHUYỂN NGÔN NGỮ
    function updateUI() {
        const l = translations[curLang];
        document.getElementById('currentLangBtn').innerText = l.langBtn;
        document.getElementById('lbl-totalStaff').innerText = l.totalStaff;
        document.getElementById('lbl-working').innerText = l.working;
        document.getElementById('lbl-totalOT').innerText = l.totalOT;
        document.getElementById('lbl-absent').innerText = l.absent;
        document.getElementById('lbl-punchIn').innerText = l.punchIn;
        document.getElementById('btn-confirm').innerText = l.confirm;
        document.getElementById('lbl-dashboard').innerText = l.dashboard;
        document.getElementById('btn-staffMgmt').innerText = l.staffMgmt;
        document.getElementById('btn-report').innerText = l.report;
        document.getElementById('btn-excel').innerText = l.excel;
        document.getElementById('lbl-todayLog').innerText = l.todayLog;
        document.getElementById('filterInput').placeholder = l.searchPlace;
        document.getElementById('th-name').innerText = l.thName;
        document.getElementById('th-in').innerText = l.thIn;
        document.getElementById('th-out').innerText = l.thOut;
        document.getElementById('th-total').innerText = l.thTotal;
        document.getElementById('th-ot').innerText = l.thOT;
        refreshTable();
    }

    function toggleLang() {
        curLang = curLang === 'vi' ? 'cn' : 'vi';
        localStorage.setItem('lang', curLang);
        updateUI();
    }

    // 3. LOGIC XỬ LÝ (Đã sửa lỗi vắng âm & đa ngôn ngữ)
    function checkIn() {
        const name = document.getElementById('empSelect').value;
        if (!name) return;
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-CA');
        const timeStr = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');

        let record = db.find(r => r.name === name && r.date === dateStr && r.timeOut === "");
        const l = translations[curLang];

        if (!record) {
            db.push({ id: Date.now(), date: dateStr, name, timeIn: timeStr, timeOut: "", workHours: 0, ot: 0 });
            Swal.fire({ icon: 'success', title: l.msgSuccessIn, text: name, timer: 1500 });
        } else {
            record.timeOut = timeStr;
            const [hI, mI] = record.timeIn.split(':').map(Number);
            const tIn = new Date(2000, 0, 1, hI, mI);
            const tOut = new Date(2000, 0, 1, now.getHours(), now.getMinutes());
            record.workHours = parseFloat(((tOut - tIn) / 3600000).toFixed(2));
            const tOT = new Date(2000, 0, 1, 16, 30);
            record.ot = tOut > tOT ? parseFloat(((tOut - tOT) / 3600000).toFixed(2)) : 0;
            Swal.fire({ icon: 'info', title: l.msgSuccessOut, text: name, timer: 1500 });
        }
        saveData(); refreshTable();
    }

    function refreshTable() {
        const today = new Date().toLocaleDateString('en-CA');
        const search = document.getElementById('filterInput').value.toUpperCase();
        const body = document.getElementById('logTableBody');
        const l = translations[curLang];
        body.innerHTML = "";

        const dayLogs = db.filter(r => r.date === today);
        dayLogs.filter(r => r.name.includes(search)).reverse().forEach(r => {
            body.innerHTML += `
                <tr>
                    <td><b>${r.name}</b><br><small class="${r.timeOut ? 'text-success' : 'text-warning'}">● ${r.timeOut ? l.statusOut : l.statusIn}</small></td>
                    <td>${r.timeIn}</td><td>${r.timeOut || '--:--'}</td>
                    <td>${r.workHours}h</td><td class="text-danger fw-bold">${r.ot}h</td>
                    <td><button onclick="deleteRow(${r.id})" class="btn btn-sm text-danger border-0"><i class="bi bi-x-circle"></i></button></td>
                </tr>`;
        });
        
        // Cập nhật stats (Sửa lỗi âm)
        const uniquePresent = new Set(dayLogs.map(r => r.name)).size;
        document.getElementById('statTotalStaff').innerText = staff.length;
        document.getElementById('statWorking').innerText = dayLogs.filter(r => !r.timeOut).length;
        document.getElementById('statAbsent').innerText = Math.max(0, staff.length - uniquePresent);
        document.getElementById('statTotalOT').innerText = db.reduce((a, b) => a + (b.ot || 0), 0).toFixed(1) + "h";
    }

    function saveData() {
        localStorage.setItem('hrm_db_v3', JSON.stringify(db));
        localStorage.setItem('hrm_staff_v3', JSON.stringify(staff));
        renderSelect();
    }

    function renderSelect() {
        const sel = document.getElementById('empSelect');
        const current = sel.value;
        sel.innerHTML = `<option value="">-- ${curLang === 'vi' ? 'Chọn nhân viên' : '选择员工'} --</option>`;
        staff.sort().forEach(s => sel.innerHTML += `<option value="${s}" ${s === current ? 'selected' : ''}>${s}</option>`);
    }

    function deleteRow(id) { if(confirm("Xóa?")) { db = db.filter(r => r.id !== id); saveData(); refreshTable(); } }
    
    setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('vi-VN'); }, 1000);
    document.getElementById('fullDate').innerText = new Date().toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long' });
    
    window.onload = () => { renderSelect(); updateUI(); };
</script>
</body>
</html>
